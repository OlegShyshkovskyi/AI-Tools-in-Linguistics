<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №4: Хмарний TTS</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #eef2f3; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%; 
            max-width: 450px; 
        }
        h2 { margin-top: 0; color: #333; }
        textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
            resize: vertical;
            font-size: 16px;
        }
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-size: 16px;
            cursor: pointer;
            box-sizing: border-box;
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            width: 100%;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Генератор мовлення (API)</h2>
        <textarea id="text-input" rows="4" placeholder="Введіть текст..."></textarea>
        
        <select id="lang-select">
            <option value="uk">Українська мова</option>
            <option value="en">English (Англійська)</option>
        </select>

        <button id="speak-btn">Озвучити текст</button>
    </div>

    <script>
        document.getElementById('speak-btn').addEventListener('click', function() {
            const text = document.getElementById('text-input').value.trim();
            const lang = document.getElementById('lang-select').value;
            
            if (!text) {
                alert('Будь ласка, введіть текст!');
                return;
            }

            const apiUrl = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${lang}&q=${encodeURIComponent(text)}`;
            
            const audio = new Audio(apiUrl);
            
            audio.play().catch(error => {
                console.error('Помилка відтворення:', error);
                alert('Сталася помилка. Можливо, текст занадто довгий (ліміт ~200 символів).');
            });
        });
    </script>

</body>
</html>
